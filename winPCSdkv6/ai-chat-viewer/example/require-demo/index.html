<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIChatViewer require demo</title>
    <style>
      :root {
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f2f4f8;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: #fff;
        border-bottom: 1px solid #dfe3eb;
      }
      .toolbar button {
        border: 0;
        padding: 7px 14px;
        border-radius: 6px;
        color: #fff;
        background: #2468f2;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #1c55c8;
      }
      .status {
        margin-left: auto;
        color: #4b5565;
        font-size: 12px;
      }
      #root {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="mountBtn" type="button">mount</button>
      <button id="unmountBtn" type="button">unmount</button>
      <button id="remountBtn" type="button">remount</button>
      <span id="status" class="status">[require-demo] initializing...</span>
    </div>
    <div id="root"></div>
  </body>
</html>
